name: CI Pipeline

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          # Pin pnpm 8: Nx 19.1's lockfile parser only understands the
          # v5/v6 pnpm-lock.yaml format, not the v9 format pnpm 9+ writes.
          version: 8

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          CYPRESS_INSTALL_BINARY: 0  # Skip Cypress binary download

      - name: Lint backend
        run: npx nx run backend:lint
        continue-on-error: false

      - name: Lint frontend
        run: npx nx run frontend:lint
        continue-on-error: false

      - name: Build backend
        run: npx nx run backend:build
        env:
          # Set minimal environment variables required for build
          TW_SECRET_KEY: test-secret-key-for-ci-build-only
          TW_FRONTEND_URL: http://localhost:4200
          TW_DB_HOST: localhost
          TW_DB_PORT: 5432
          TW_DB_USERNAME: postgres
          TW_DB_PASSWORD: postgres
          TW_DB_NAME: tillywork_test
          TW_REDIS_HOST: localhost
          TW_REDIS_PORT: 6379
          PORT: 3000
          NODE_ENV: test

      - name: Build frontend
        run: npx nx run frontend:build
        env:
          TW_VITE_API_URL: http://localhost:3000/v1

  security-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18.x

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high --prod
        continue-on-error: true  # Don't fail CI on audit issues, but report them

      - name: Check for critical vulnerabilities
        # Scoped to production deps: critical CVEs in dev-only tooling (e.g. Nx/Vitest
        # major-version bumps) shouldn't hard-block every push; Dependabot tracks those.
        run: pnpm audit --audit-level=critical --prod
        continue-on-error: false  # Fail CI on critical vulnerabilities shipped to users
